<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과일 짝 맞추기</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="game">
    <header class="game-header">
      <h1>과일 짝 맞추기</h1>
      <p id="message">카드 2장을 클릭해서 같은 과일을 찾아보세요.</p>
    </header>

    <section class="status-panel" aria-label="게임 상태">
      <div class="status-card">
        <span>시도 횟수</span>
        <strong id="try-count">0</strong>
      </div>
      <div class="status-card">
        <span>찾은 짝</span>
        <strong id="match-count">0 / 18</strong>
      </div>
      <div class="status-card timer-card">
        <span>남은 시간</span>
        <strong id="timer">3:00</strong>
      </div>
      <button id="reset-button" class="reset-button" type="button">다시 시작</button>
    </section>

    <section id="board" class="board" aria-label="과일 카드 게임판"></section>
  </main>

  <script src="js/util.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
